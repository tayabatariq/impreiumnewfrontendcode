<script>
    // ── Auth ──
    window.addEventListener('DOMContentLoaded', () => {
        const user = localStorage.getItem('user');
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        const userData = JSON.parse(user);
        document.getElementById('welcomeMsg').innerHTML =
            `<span style="font-weight:300;">Welcome 👋 , <br> Logged in As </span><span style="font-weight:500;">${userData.name}</span>`;
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
    });

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    // ── Preloader (initial load) ──
    window.addEventListener('load', () => {
        const pre = document.getElementById('preloader');
        setTimeout(() => {
            pre.style.transition = 'opacity 0.8s ease';
            pre.style.opacity = 0;
            setTimeout(() => { pre.style.display = 'none'; }, 800);
        }, 3000);
    });

    // ── Canvas editor ──
    const SIZES = {
        facebook:  { w: 1200, h: 630  },
        instagram: { w: 1080, h: 1080 },
        tiktok:    { w: 1080, h: 1920 },
    };

    let activePlatform = 'facebook';
    let bgImageData    = null;
    let layers         = [];
    let selectedIdx    = -1;
    let editingIdx     = -1;

    let action       = null;
    let resizeCorner = null;
    let dragOffX     = 0, dragOffY = 0;
    let resizeStart  = null;

    const HANDLE_R   = 18;
    const HANDLE_PAD = 16;

    // Platform tabs
    document.querySelectorAll('.platform-tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.platform-tabs button').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            activePlatform = btn.dataset.platform;
        });
    });

    // Screen helpers
    function showScreen2() {
        document.getElementById('screen1').style.display = 'none';
        document.getElementById('screen2').style.display = 'block';
        initCanvas();
    }
    function showScreen1() {
        document.getElementById('screen2').style.display = 'none';
        document.getElementById('screen1').style.display = 'block';
        bgImageData = null;
        layers      = [];
        selectedIdx = -1;
        action      = null;
    }

    // Upload bg image
    document.getElementById('uploadImageBtn').addEventListener('click', () => {
        document.getElementById('bgFileInput').click();
    });
    document.getElementById('bgFileInput').addEventListener('change', function () {
        const file = this.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => { bgImageData = img; showScreen2(); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
    });

    document.getElementById('plainCanvasBtn').addEventListener('click', () => {
        bgImageData = null; showScreen2();
    });
    document.getElementById('backBtn').addEventListener('click', showScreen1);

    // Canvas
    const canvas = document.getElementById('adCanvas');
    const ctx    = canvas.getContext('2d');

    function getScale() {
        return canvas.width / canvas.getBoundingClientRect().width;
    }

    function initCanvas() {
        const { w, h } = SIZES[activePlatform];
        canvas.width  = w;
        canvas.height = h;
        layers      = [];
        selectedIdx = -1;
        action      = null;
        scaleCanvas();
        updateToolbar();
        redraw();
    }

    function scaleCanvas() {
        const { w, h } = SIZES[activePlatform];
        const maxW  = Math.min(window.innerWidth - 48, 820);
        const maxH  = Math.min(window.innerHeight * 0.78, 780);
        let scale   = maxW / w;
        if (h * scale > maxH) scale = maxH / h;
        canvas.style.width  = (w * scale) + 'px';
        canvas.style.height = (h * scale) + 'px';
    }

    // Draw
    function redraw(showSel = true) {
        const { w, h } = SIZES[activePlatform];
        ctx.clearRect(0, 0, w, h);
        if (bgImageData) {
            ctx.drawImage(bgImageData, 0, 0, w, h);
        } else {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
        }
        layers.forEach((layer, i) => {
            drawLayer(layer);
            if (showSel && i === selectedIdx) drawSelection(layer);
        });
    }

    function drawLayer(layer) {
        if (layer.type === 'image') {
            ctx.drawImage(layer.img, layer.x, layer.y, layer.dw, layer.dh);
        } else if (layer.type === 'text') {
            ctx.save();
            ctx.font         = `bold ${layer.size}px ${layer.family}`;
            ctx.fillStyle    = layer.color;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor  = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur   = 8;
            ctx.fillText(layer.text, layer.x, layer.y);
            ctx.restore();
            ctx.font = `bold ${layer.size}px ${layer.family}`;
            const tw = ctx.measureText(layer.text).width;
            const th = layer.size * 1.2;
            layer.bbox = { x: layer.x - tw / 2, y: layer.y - th / 2, w: tw, h: th };
        }
    }

    function getBounds(layer) {
        if (layer.type === 'image') return { x: layer.x, y: layer.y, w: layer.dw, h: layer.dh };
        const b = layer.bbox || { x: layer.x, y: layer.y, w: 0, h: 0 };
        return { x: b.x, y: b.y, w: b.w, h: b.h };
    }

    function getHandles(layer) {
        const p = HANDLE_PAD;
        const b = getBounds(layer);
        return {
            tl: { x: b.x - p,       y: b.y - p       },
            tr: { x: b.x + b.w + p, y: b.y - p       },
            bl: { x: b.x - p,       y: b.y + b.h + p },
            br: { x: b.x + b.w + p, y: b.y + b.h + p },
        };
    }

    function drawSelection(layer) {
        const b       = getBounds(layer);
        const p       = HANDLE_PAD;
        const handles = getHandles(layer);
        ctx.save();
        ctx.strokeStyle = '#5264f5';
        ctx.lineWidth   = 4;
        ctx.setLineDash([16, 8]);
        ctx.strokeRect(b.x - p, b.y - p, b.w + p * 2, b.h + p * 2);
        ctx.setLineDash([]);
        const isImg = layer.type === 'image';
        Object.values(handles).forEach(({ x, y }) => {
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fillStyle   = isImg ? '#5264f5' : '#aaa';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth   = 3;
            ctx.stroke();
        });
        ctx.restore();
    }

    // Hit testing
    function hitHandle(cx, cy, layer) {
        if (layer.type !== 'image') return null;
        const handles = getHandles(layer);
        for (const [corner, pos] of Object.entries(handles)) {
            if (Math.hypot(cx - pos.x, cy - pos.y) < HANDLE_R) return corner;
        }
        return null;
    }

    function hitLayer(cx, cy) {
        for (let i = layers.length - 1; i >= 0; i--) {
            const l = layers[i];
            if (l.type === 'image') {
                if (cx >= l.x && cx <= l.x + l.dw && cy >= l.y && cy <= l.y + l.dh) return i;
            } else if (l.type === 'text' && l.bbox) {
                const { x, y, w, h } = l.bbox;
                const p = HANDLE_PAD;
                if (cx >= x - p && cx <= x + w + p && cy >= y - p && cy <= y + h + p) return i;
            }
        }
        return -1;
    }

    // Pointer events
    function canvasCoords(ex, ey) {
        const scale = getScale();
        const rect  = canvas.getBoundingClientRect();
        return { cx: (ex - rect.left) * scale, cy: (ey - rect.top) * scale };
    }

    function pointerDown(ex, ey) {
        const { cx, cy } = canvasCoords(ex, ey);
        if (selectedIdx >= 0 && layers[selectedIdx].type === 'image') {
            const corner = hitHandle(cx, cy, layers[selectedIdx]);
            if (corner) {
                action       = 'resize';
                resizeCorner = corner;
                const l      = layers[selectedIdx];
                resizeStart  = { cx, cy, x: l.x, y: l.y, dw: l.dw, dh: l.dh };
                return;
            }
        }
        const hit = hitLayer(cx, cy);
        selectedIdx = hit;
        updateToolbar();
        if (hit >= 0) {
            action   = 'drag';
            const l  = layers[hit];
            dragOffX = cx - l.x;
            dragOffY = cy - l.y;
        } else {
            action = null;
        }
        redraw();
    }

    function pointerMove(ex, ey) {
        if (!action || selectedIdx < 0) return;
        const { cx, cy } = canvasCoords(ex, ey);
        const l = layers[selectedIdx];
        if (action === 'drag') {
            l.x = cx - dragOffX;
            l.y = cy - dragOffY;
        } else if (action === 'resize' && resizeStart) {
            const { x: ox, y: oy, dw: odw, dh: odh } = resizeStart;
            const ratio = odw / odh;
            const dx    = cx - resizeStart.cx;
            const dy    = cy - resizeStart.cy;
            if (resizeCorner === 'br') {
                l.dw = Math.max(40, odw + dx);
                l.dh = l.dw / ratio;
            } else if (resizeCorner === 'bl') {
                const nw = Math.max(40, odw - dx);
                l.dh     = nw / ratio;
                l.x      = ox + (odw - nw);
                l.dw     = nw;
            } else if (resizeCorner === 'tr') {
                l.dw     = Math.max(40, odw + dx);
                const nh = l.dw / ratio;
                l.y      = oy + (odh - nh);
                l.dh     = nh;
            } else if (resizeCorner === 'tl') {
                const nw = Math.max(40, odw - dx);
                const nh = nw / ratio;
                l.x      = ox + (odw - nw);
                l.y      = oy + (odh - nh);
                l.dw     = nw;
                l.dh     = nh;
            }
        }
        redraw();
    }

    function pointerUp() { action = null; resizeStart = null; }

    canvas.addEventListener('mousedown',  e => pointerDown(e.clientX, e.clientY));
    canvas.addEventListener('mousemove',  e => pointerMove(e.clientX, e.clientY));
    canvas.addEventListener('mouseup',    pointerUp);
    canvas.addEventListener('mouseleave', pointerUp);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend',   pointerUp);

    // Toolbar
    function updateToolbar() {
        const hasSel = selectedIdx >= 0;
        const isText = hasSel && layers[selectedIdx]?.type === 'text';
        document.getElementById('editLayerBtn').disabled   = !isText;
        document.getElementById('deleteLayerBtn').disabled = !hasSel;
    }

    // Add Image layer
    document.getElementById('addImageBtn').addEventListener('click', () => document.getElementById('layerFileInput').click());
    document.getElementById('layerFileInput').addEventListener('change', function () {
        const file = this.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const { w, h } = SIZES[activePlatform];
                const ratio = img.width / img.height;
                const dw    = w * 0.5;
                const dh    = dw / ratio;
                layers.push({ type: 'image', img, x: (w - dw) / 2, y: (h - dh) / 2, dw, dh });
                selectedIdx = layers.length - 1;
                updateToolbar();
                redraw();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
    });

    // Delete
    document.getElementById('deleteLayerBtn').addEventListener('click', () => {
        if (selectedIdx < 0) return;
        layers.splice(selectedIdx, 1);
        selectedIdx = -1;
        updateToolbar();
        redraw();
    });

    // Text popup
    const textOverlay   = document.getElementById('textOverlay');
    const fontSizeInput = document.getElementById('fontSizeInput');
    const fontSizeVal   = document.getElementById('fontSizeVal');

    fontSizeInput.addEventListener('input', () => fontSizeVal.textContent = fontSizeInput.value);

    function openTextPopup(idx = -1) {
        editingIdx = idx;
        if (idx >= 0) {
            const l = layers[idx];
            document.getElementById('textInput').value       = l.text;
            fontSizeInput.value                               = l.size;
            fontSizeVal.textContent                           = l.size;
            document.getElementById('textColorInput').value  = l.color;
            document.getElementById('fontFamilyInput').value = l.family;
            document.querySelector('.text-popup h3').textContent = 'Edit Text';
        } else {
            document.getElementById('textInput').value       = '';
            fontSizeInput.value                               = 40;
            fontSizeVal.textContent                           = 40;
            document.getElementById('textColorInput').value  = '#ffffff';
            document.getElementById('fontFamilyInput').value = 'Arial';
            document.querySelector('.text-popup h3').textContent = 'Add Text';
        }
        textOverlay.classList.add('show');
    }

    document.getElementById('addTextBtn').addEventListener('click',   () => openTextPopup(-1));
    document.getElementById('editLayerBtn').addEventListener('click', () => {
        if (selectedIdx >= 0 && layers[selectedIdx].type === 'text') openTextPopup(selectedIdx);
    });
    document.getElementById('cancelTextBtn').addEventListener('click', () => textOverlay.classList.remove('show'));

    document.getElementById('confirmTextBtn').addEventListener('click', () => {
        const text   = document.getElementById('textInput').value.trim();
        if (!text) return;
        const size   = parseInt(fontSizeInput.value);
        const color  = document.getElementById('textColorInput').value;
        const family = document.getElementById('fontFamilyInput').value;
        const { w, h } = SIZES[activePlatform];
        if (editingIdx >= 0) {
            Object.assign(layers[editingIdx], { text, size, color, family });
        } else {
            layers.push({ type: 'text', text, size, color, family, x: w / 2, y: h / 2 });
            selectedIdx = layers.length - 1;
        }
        updateToolbar();
        redraw();
        textOverlay.classList.remove('show');
    });

    textOverlay.addEventListener('click', e => { if (e.target === textOverlay) textOverlay.classList.remove('show'); });

    // Download (auth-gated — already logged in to reach this page, but double-check)
    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!localStorage.getItem('user')) { window.location.href = 'signup.html'; return; }
        const prev  = selectedIdx;
        selectedIdx = -1;
        redraw(false);
        selectedIdx = prev;
        const link    = document.createElement('a');
        link.download = `ad-${activePlatform}-${Date.now()}.png`;
        link.href     = canvas.toDataURL('image/png');
        link.click();
        // Reset everything after download
        showScreen1();
    });

    window.addEventListener('resize', () => {
        if (document.getElementById('screen2').style.display !== 'none') scaleCanvas();
    });
</script>
</body>
</html>
